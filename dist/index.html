  <script>
/* =========================================================================
 * utils.js — matematički i pomoćni alati. Global: Utils
 * ========================================================================= */
const Utils = {
  clamp: (v, lo, hi) => v < lo ? lo : v > hi ? hi : v,
  lerp: (a, b, t) => a + (b - a) * t,
  dist2: (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; },
  dist: (ax, ay, bx, by) => Math.hypot(ax - bx, ay - by),
  angle: (ax, ay, bx, by) => Math.atan2(by - ay, bx - ax),
  rand: (a, b) => a + Math.random() * (b - a),
  randInt: (a, b) => Math.floor(a + Math.random() * (b - a + 1)),
  choice: arr => arr[Math.floor(Math.random() * arr.length)],

  // Razlika dva ugla normalizovana na [-PI, PI]
  angleDiff(a, b) {
    let d = a - b;
    while (d > Math.PI) d -= Math.PI * 2;
    while (d < -Math.PI) d += Math.PI * 2;
    return d;
  },

  // Krug-krug sudar
  circlesHit: (ax, ay, ar, bx, by, br) => Utils.dist2(ax, ay, bx, by) < (ar + br) * (ar + br),

  // Da li je tačka u rotiranom isečku (za zamah kopljem): dist <= range i ugao u luku
  inArc(px, py, ox, oy, facing, range, halfArc) {
    if (Utils.dist2(px, py, ox, oy) > range * range) return false;
    return Math.abs(Utils.angleDiff(Utils.angle(ox, oy, px, py), facing)) <= halfArc;
  },

  // Pomeranje vrednosti ka cilju brzinom rate*dt
  approach(v, target, step) {
    if (v < target) return Math.min(v + step, target);
    if (v > target) return Math.max(v - step, target);
    return v;
  },
};

  <script>
/* =========================================================================
 * art.js — Sva grafika se crta programski (bez učitavanja slika), u stilu
 * asset sheet-ova: vedar crtani izgled, debela tamna kontura, paleta mora.
 * Sve funkcije crtaju u SVETSKIM koordinatama (kameru postavlja pozivalac).
 * Global: Art
 * ========================================================================= */
const Art = (() => {
  const C = CONFIG.colors;
  const OUTLINE = '#2c2419';

  function ol(ctx, lw = 3) { ctx.lineWidth = lw; ctx.strokeStyle = OUTLINE; ctx.stroke(); }
  function shadow(ctx, x, y, rx, ry) {
    ctx.save(); ctx.globalAlpha = 0.22; ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(x, y, rx, ry, 0, 0, 6.2832); ctx.fill(); ctx.restore();
  }
  function circle(ctx, x, y, r, fill) { ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fillStyle = fill; ctx.fill(); }
  function rr(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
  }

  // ---------------------------------------------------------------- GLAVNI JUNAK
  function player(ctx, p) {
    const flip = Math.cos(p.facing) < -0.01 ? -1 : 1;
    const bob = p.moving ? Math.sin(p.animT * 11) * 2 : Math.sin(p.animT * 3) * 0.8;
    const legSwing = p.moving ? Math.sin(p.animT * 11) * 4 : 0;
    shadow(ctx, p.x, p.y + 16, 17, 7);
    ctx.save();
    ctx.translate(p.x, p.y - 6 + bob);
    ctx.scale(flip, 1);
    if (p.hurtT > 0 && Math.floor(p.hurtT * 20) % 2) ctx.globalAlpha = 0.55;

    // noge
    ctx.fillStyle = C.skin;
    rr(ctx, -9 + legSwing, 10, 8, 14, 4); ctx.fill(); ol(ctx, 2);
    rr(ctx, 2 - legSwing, 10, 8, 14, 4); ctx.fill(); ol(ctx, 2);
    // šorts (zeleno-plavi)
    const g = ctx.createLinearGradient(0, 2, 0, 16);
    g.addColorStop(0, C.shortsTop); g.addColorStop(1, C.shortsBot);
    ctx.fillStyle = g; rr(ctx, -11, 2, 22, 14, 5); ctx.fill(); ol(ctx, 2.5);
    // telo (koža)
    ctx.fillStyle = C.skin; rr(ctx, -9, -12, 18, 18, 7); ctx.fill(); ol(ctx, 2.5);
    // ogrlica + školjka
    ctx.beginPath(); ctx.arc(0, -11, 7, 0.15, Math.PI - 0.15); ol(ctx, 2);
    circle(ctx, 0, -4, 3.2, C.shell); ol(ctx, 1.5);
    // glava
    circle(ctx, 0, -22, 11, C.skin); ol(ctx, 2.5);
    // kosa (čupava braon)
    ctx.fillStyle = C.hair;
    ctx.beginPath();
    ctx.moveTo(-11, -24);
    ctx.quadraticCurveTo(-12, -36, -4, -33);
    ctx.quadraticCurveTo(-2, -39, 3, -34);
    ctx.quadraticCurveTo(8, -40, 10, -31);
    ctx.quadraticCurveTo(13, -30, 11, -23);
    ctx.quadraticCurveTo(6, -29, 0, -28);
    ctx.quadraticCurveTo(-6, -29, -11, -24);
    ctx.closePath(); ctx.fill(); ol(ctx, 2);
    // lice
    circle(ctx, 3, -22, 1.8, '#2c2419');
    circle(ctx, -3, -22, 1.8, '#2c2419');
    ctx.beginPath(); ctx.arc(0, -19, 4, 0.15, Math.PI - 0.15); ctx.lineWidth = 1.6; ctx.strokeStyle = '#2c2419'; ctx.stroke();
    ctx.globalAlpha = Math.min(ctx.globalAlpha, 0.6); circle(ctx, 7, -20, 2.4, '#f09a86'); ctx.globalAlpha = 1;

    // koplje (ruka) — drži ga sa strane, zamah napred pri napadu
    const atk = p.attackT > 0 ? Math.sin((1 - p.attackT) * Math.PI) : 0;
    ctx.save();
    ctx.translate(14, 2);
    ctx.rotate(-0.12 - atk * 1.42);
    ctx.strokeStyle = '#8a5a36'; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(0, -28 - atk * 8); ctx.stroke();
    // vrh koplja
    ctx.fillStyle = C.stoneLight; ctx.beginPath();
    ctx.moveTo(0, -36 - atk * 8); ctx.lineTo(-5, -27 - atk * 8); ctx.lineTo(5, -27 - atk * 8); ctx.closePath();
    ctx.fill(); ol(ctx, 1.5);
    ctx.restore();
    ctx.restore();
  }

  // ---------------------------------------------------------------- KANTO MAČEVAC
  function enemy(ctx, e) {
    if (e.defeatT > 0) return enemyDefeated(ctx, e);
    const flip = e.facing < -0.01 || (Math.cos(e.facing) < 0) ? -1 : 1;
    const bob = e.moving ? Math.sin(e.animT * 12) * 1.6 : 0;
    const legSwing = e.moving ? Math.sin(e.animT * 12) * 3 : 0;
    shadow(ctx, e.x, e.y + 15, 15, 6);
    ctx.save();
    ctx.translate(e.x, e.y - 4 + bob);
    ctx.scale(flip, 1);
    if (e.hurtT > 0 && Math.floor(e.hurtT * 22) % 2) ctx.globalAlpha = 0.5;
    // noge (zelene)
    ctx.fillStyle = C.enemyBody;
    rr(ctx, -8 + legSwing, 8, 7, 11, 3); ctx.fill(); ol(ctx, 2);
    rr(ctx, 2 - legSwing, 8, 7, 11, 3); ctx.fill(); ol(ctx, 2);
    // suknjica od algi
    ctx.fillStyle = C.seaweed;
    for (let i = -8; i <= 6; i += 4) { ctx.beginPath(); ctx.moveTo(i, 4); ctx.lineTo(i + 2, 12); ctx.lineTo(i + 4, 4); ctx.closePath(); ctx.fill(); }
    // pojas
    ctx.fillStyle = '#6b4423'; rr(ctx, -9, 1, 18, 5, 2); ctx.fill(); ol(ctx, 1.5);
    // telo/ruke
    ctx.fillStyle = C.enemyBody; rr(ctx, -8, -10, 16, 13, 5); ctx.fill(); ol(ctx, 2);
    // kanta-glava (trapez)
    ctx.fillStyle = C.bucket;
    ctx.beginPath(); ctx.moveTo(-11, -28); ctx.lineTo(11, -28); ctx.lineTo(8, -10); ctx.lineTo(-8, -10); ctx.closePath();
    ctx.fill(); ol(ctx, 2.5);
    ctx.fillStyle = C.bucketDark; rr(ctx, -11, -30, 22, 4, 2); ctx.fill(); ol(ctx, 2);
    // koralni čuperak na vrhu
    ctx.strokeStyle = C.coralOrange; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(2, -30); ctx.lineTo(4, -38); ctx.moveTo(4, -38); ctx.lineTo(0, -36); ctx.moveTo(4, -38); ctx.lineTo(7, -36); ctx.stroke();
    // ljute oči (prorez)
    ctx.fillStyle = '#1a1a1a'; rr(ctx, -6, -22, 12, 4, 1.5); ctx.fill();
    ctx.fillStyle = '#fff'; circle(ctx, -3, -20, 1.4, '#fff'); circle(ctx, 3, -20, 1.4, '#fff');
    // mač
    const atk = e.attackAnim > 0 ? Math.sin(e.attackAnim * Math.PI) : 0;
    ctx.save(); ctx.translate(9, -4); ctx.rotate(-0.3 - atk * 1.1);
    ctx.fillStyle = C.stoneLight; rr(ctx, -2, -26, 4, 26, 1.5); ctx.fill(); ol(ctx, 1.5);
    ctx.fillStyle = '#6b4423'; rr(ctx, -3, -2, 6, 5, 1.5); ctx.fill();
    ctx.restore();
    ctx.restore();
  }

  function enemyDefeated(ctx, e) {
    const t = e.defeatT;                  // 1 -> 0
    shadow(ctx, e.x, e.y + 12, 16, 6);
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.globalAlpha = Math.max(0, t);
    ctx.rotate((1 - t) * 1.4);
    ctx.fillStyle = C.bucket;
    ctx.beginPath(); ctx.moveTo(-11, -8); ctx.lineTo(11, -8); ctx.lineTo(8, 8); ctx.lineTo(-8, 8); ctx.closePath(); ctx.fill(); ol(ctx, 2);
    ctx.fillStyle = '#1a1a1a'; ctx.font = '10px sans-serif'; ctx.fillText('x x', -7, -2);
    ctx.restore();
    // zvezdice
    ctx.save(); ctx.globalAlpha = Math.max(0, t);
    ctx.fillStyle = '#f4c842';
    for (let i = 0; i < 3; i++) { const a = (1 - t) * 6 + i * 2; star(ctx, e.x + Math.cos(a) * (12 + (1 - t) * 14), e.y - 18 - (1 - t) * 12 + Math.sin(a) * 4, 4); }
    ctx.restore();
  }

  function star(ctx, x, y, r) {
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = -Math.PI / 2 + i * Math.PI * 2 / 5;
      ctx.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
      const a2 = a + Math.PI / 5;
      ctx.lineTo(x + Math.cos(a2) * r * 0.45, y + Math.sin(a2) * r * 0.45);
    }
    ctx.closePath(); ctx.fill();
  }

  // ---------------------------------------------------------------- BOSS: MORSKI GRGO
  function boss(ctx, b) {
    const flip = b.facing < -0.01 || Math.cos(b.facing) < 0 ? -1 : 1;
    const R = b.r;
    shadow(ctx, b.x, b.y + R * 0.7, R * 1.1, R * 0.4);
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.scale(flip, 1);
    if (b.hurtT > 0 && Math.floor(b.hurtT * 18) % 2) ctx.globalAlpha = 0.5;
    if (b.state === 'defeated') ctx.rotate(0.5);

    // rep
    ctx.fillStyle = C.boss;
    ctx.beginPath(); ctx.moveTo(-R * 0.9, 0); ctx.lineTo(-R * 1.6, -R * 0.5); ctx.lineTo(-R * 1.4, 0); ctx.lineTo(-R * 1.6, R * 0.5); ctx.closePath(); ctx.fill(); ol(ctx, 2.5);
    // telo
    ctx.beginPath(); ctx.ellipse(0, 0, R * 1.15, R * 0.92, 0, 0, 6.2832); ctx.fillStyle = C.boss; ctx.fill(); ol(ctx, 3);
    // svetli stomak
    ctx.beginPath(); ctx.ellipse(R * 0.15, R * 0.28, R * 0.85, R * 0.5, 0, 0, 6.2832); ctx.fillStyle = C.bossLight; ctx.fill();
    // pege
    ctx.fillStyle = 'rgba(20,60,60,0.35)';
    for (const s of [[-.3, -.4, .16], [.1, -.5, .12], [.4, -.2, .14], [-.1, -.1, .1]]) { circle(ctx, R * s[0], R * s[1], R * s[2], 'rgba(20,60,60,0.35)'); }
    // peraja
    ctx.fillStyle = C.boss;
    ctx.beginPath(); ctx.ellipse(R * 0.1, R * 0.85, R * 0.3, R * 0.5, 0.5, 0, 6.2832); ctx.fill(); ol(ctx, 2);
    ctx.beginPath(); ctx.moveTo(R * 0.1, -R * 0.85); ctx.lineTo(R * 0.45, -R * 1.3); ctx.lineTo(R * 0.55, -R * 0.7); ctx.closePath(); ctx.fill(); ol(ctx, 2);
    // medveđe uši
    circle(ctx, R * 0.55, -R * 0.75, R * 0.22, C.boss); ol(ctx, 2.5);
    circle(ctx, R * 0.95, -R * 0.6, R * 0.2, C.boss); ol(ctx, 2.5);
    // njuška
    circle(ctx, R * 0.95, R * 0.05, R * 0.42, C.bossSnout); ol(ctx, 2.5);
    circle(ctx, R * 1.2, R * 0.0, R * 0.1, '#2c2419');   // nos
    // usta — otvorena pri jurišu/ riku
    if (b.state === 'charge' || b.state === 'bite' || b.attackAnim > 0) {
      ctx.beginPath(); ctx.ellipse(R * 1.0, R * 0.32, R * 0.3, R * 0.22, 0, 0, 6.2832); ctx.fillStyle = '#7a2433'; ctx.fill(); ol(ctx, 2);
      ctx.fillStyle = '#fff';
      for (let i = -2; i <= 2; i++) { ctx.beginPath(); ctx.moveTo(R * (0.86 + i * 0.06), R * 0.2); ctx.lineTo(R * (0.83 + i * 0.06), R * 0.32); ctx.lineTo(R * (0.89 + i * 0.06), R * 0.32); ctx.closePath(); ctx.fill(); }
    }
    // oči (ljute)
    ctx.fillStyle = '#fff'; circle(ctx, R * 0.45, -R * 0.18, R * 0.13, '#fff'); circle(ctx, R * 0.8, -R * 0.22, R * 0.12, '#fff');
    ctx.fillStyle = '#1a1a1a'; circle(ctx, R * 0.48, -R * 0.16, R * 0.06, '#1a1a1a'); circle(ctx, R * 0.82, -R * 0.2, R * 0.06, '#1a1a1a');
    if (b.state === 'defeated') { ctx.fillStyle = '#1a1a1a'; ctx.font = `${R * 0.3}px sans-serif`; ctx.fillText('x  x', R * 0.35, -R * 0.1); }
    // obrve
    ctx.strokeStyle = '#1a4b46'; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(R * 0.34, -R * 0.4); ctx.lineTo(R * 0.58, -R * 0.28); ctx.moveTo(R * 0.7, -R * 0.42); ctx.lineTo(R * 0.92, -R * 0.34); ctx.stroke();
    ctx.restore();
  }

  // ---------------------------------------------------------------- BUBLING (prijatelj)
  function friend(ctx, f, bobT) {
    const bob = Math.sin(bobT * 3) * 3;
    ctx.save();
    ctx.translate(f.x, f.y + bob);
    // mehur
    ctx.beginPath(); ctx.arc(0, 0, 19, 0, 6.2832);
    ctx.fillStyle = 'rgba(150,220,240,0.30)'; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 2; ctx.stroke();
    // riba
    circle(ctx, 0, 0, 12, C.friend); ol(ctx, 2.5);
    // peraja
    ctx.fillStyle = C.friendFin;
    ctx.beginPath(); ctx.moveTo(-9, 0); ctx.lineTo(-16, -7); ctx.lineTo(-16, 7); ctx.closePath(); ctx.fill(); ol(ctx, 2);
    ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(4, -16); ctx.lineTo(7, -9); ctx.closePath(); ctx.fill(); ol(ctx, 2);
    // oči + osmeh
    ctx.fillStyle = '#fff'; circle(ctx, 4, -3, 4, '#fff'); circle(ctx, 9, -2, 3, '#fff');
    ctx.fillStyle = '#1a1a1a'; circle(ctx, 5, -3, 2, '#1a1a1a'); circle(ctx, 9, -2, 1.5, '#1a1a1a');
    ctx.beginPath(); ctx.arc(5, 4, 4, 0.1, Math.PI - 0.1); ctx.lineWidth = 1.6; ctx.strokeStyle = '#1a1a1a'; ctx.stroke();
    ctx.restore();
  }

  function cage(ctx, x, y, broken) {
    shadow(ctx, x, y + 22, 26, 8);
    ctx.save(); ctx.translate(x, y);
    // baza
    ctx.fillStyle = C.stoneDark; rr(ctx, -24, 16, 48, 8, 3); ctx.fill(); ol(ctx, 2);
    if (!broken) {
      ctx.strokeStyle = C.stoneLight; ctx.lineWidth = 3; ctx.lineCap = 'round';
      for (let i = -3; i <= 3; i++) { ctx.beginPath(); ctx.moveTo(i * 7, 16); ctx.lineTo(i * 7, -22); ctx.stroke(); }
      ctx.beginPath(); ctx.ellipse(0, -22, 24, 10, 0, Math.PI, 0); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, -32, 5, 0, 6.2832); ctx.stroke();   // kuka
    } else {
      ctx.strokeStyle = C.stoneLight; ctx.lineWidth = 3; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(-20, 16); ctx.lineTo(-22, -10); ctx.moveTo(18, 16); ctx.lineTo(24, -6); ctx.stroke();
    }
    ctx.restore();
  }

  // ---------------------------------------------------------------- HRANA / PICKUP
  function coral(ctx, x, y, t) {
    const pulse = 1 + Math.sin(t * 4) * 0.08;
    ctx.save(); ctx.translate(x, y); ctx.scale(pulse, pulse);
    // sjaj
    ctx.beginPath(); ctx.arc(0, 0, 16, 0, 6.2832); ctx.fillStyle = 'rgba(255,220,150,0.25)'; ctx.fill();

      ctx.fillStyle = '#e8dcc0'; ctx.beginPath(); ctx.ellipse(0, 6, 18, 9, 0, 0, 6.2832); ctx.fill(); ol(ctx, 2.5);

/* =========================================================================
 * input.js — Objedinjeni unos: tastatura (desktop) + multi-touch (tablet).
 * Crta se preko UIManager-a, a logika/hit-test stoje ovde.
 * Global: Input (klasa). Akcije: move {x,y}, running, pressed(id), held(id).
 * ========================================================================= */
class Input {
  constructor(canvas) {
    this.canvas = canvas;
    this.keys = new Set();           // trenutno pritisnuti kodovi
    this.keyEdge = new Set();        // pritisnuti baš u ovom frejmu
    this.touchDown = new Set();      // akcije aktivne preko ekrana
    this.touchEdge = new Set();      // ekran-akcije ovog frejma
    this.pointers = new Map();       // pointerId -> {role, x, y}
    this.joyId = null;               // pointerId koji kontroliše joystick
    this.joy = { active: false, baseX: 0, baseY: 0, x: 0, y: 0, mag: 0, dx: 0, dy: 0 };
    this.touchActive = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    this.buttons = [];
    this.maxJoy = 78;
    this.showDecorate = false;       // postavlja GameManager kad je igrač u jazbini
    this._layout();
    this._bind();
  }

  // Mapiranje tastera -> akcija
  static KEYMAP = {
    Space: 'attack', KeyE: 'interact', KeyF: 'eat', KeyQ: 'signal',
    Tab: 'inventory', KeyB: 'decorate', Escape: 'pause', Enter: 'confirm',
  };

  _layout() {
    const { w, h } = CONFIG.view;
    // Donji-desni klaster za glavne akcije
    this.buttons = [
      { id: 'attack',    x: w - 120, y: h - 120, r: 62, label: 'NAPAD',  key: 'Space', color: '#ef6f5c' },
      { id: 'interact',  x: w - 252, y: h - 150, r: 46, label: 'E',      key: 'E',     color: '#4cb3c9', glyph: '✋' },
      { id: 'eat',       x: w - 150, y: h - 268, r: 46, label: 'JEDI',   key: 'F',     color: '#5fae4e', glyph: '🍴' },
      { id: 'signal',    x: w - 286, y: h - 272, r: 44, label: 'SIGNAL', key: 'Q',     color: '#e8a23a', glyph: '📡' },
      // Gornji-desni: meni dugmad
      { id: 'pause',     x: w - 52,  y: 52, r: 30, label: '⏸', key: 'Esc',  color: '#7b828c', small: true },
      { id: 'inventory', x: w - 126, y: 52, r: 30, label: '🎒', key: 'Tab',  color: '#7b828c', small: true },
      { id: 'decorate',  x: w - 200, y: 52, r: 30, label: '✨', key: 'B',    color: '#9b6fc4', small: true, onlyBurrow: true },
    ];
  }

  _bind() {
    addEventListener('keydown', e => {
      if (Input.KEYMAP[e.code] || ['Tab', 'Space'].includes(e.code)) e.preventDefault();
      if (!e.repeat) this.keyEdge.add(e.code);
      this.keys.add(e.code);
    });
    addEventListener('keyup', e => this.keys.delete(e.code));
    addEventListener('blur', () => { this.keys.clear(); this.pointers.clear(); this.joy.active = false; });

    const c = this.canvas;
    const opt = { passive: false };
    c.addEventListener('pointerdown', e => this._down(e), opt);
    c.addEventListener('pointermove', e => this._move(e), opt);
    c.addEventListener('pointerup', e => this._up(e), opt);
    c.addEventListener('pointercancel', e => this._up(e), opt);
    c.addEventListener('contextmenu', e => e.preventDefault());
  }

  // Klijent koordinate -> logičke koordinate platna
  _toLogical(e) {
    const r = this.canvas.getBoundingClientRect();
    return {
      x: (e.clientX - r.left) / r.width * CONFIG.view.w,
      y: (e.clientY - r.top) / r.height * CONFIG.view.h,
    };
  }

  _btnAt(x, y) {
    for (const b of this.buttons) {
      if (b.onlyBurrow && !this.showDecorate) continue;
      if (Utils.dist2(x, y, b.x, b.y) <= b.r * b.r) return b;
    }
    return null;
  }

  _down(e) {
    if (e.pointerType === 'touch') this.touchActive = true;
    this.canvas.setPointerCapture?.(e.pointerId);
    const p = this._toLogical(e);
    const btn = this._btnAt(p.x, p.y);
    if (btn) {
      this.pointers.set(e.pointerId, { role: 'btn:' + btn.id, x: p.x, y: p.y });
      this.touchDown.add(btn.id);
      this.touchEdge.add(btn.id);
    } else if (p.x < CONFIG.view.w * 0.55 && this.joyId == null) {
      // Levi/srednji deo = pokretni joystick (samo jedan prst kontroliše)
      this.joyId = e.pointerId;
      this.pointers.set(e.pointerId, { role: 'joy', x: p.x, y: p.y });
      this.joy.active = true; this.joy.baseX = p.x; this.joy.baseY = p.y;
      this.joy.x = p.x; this.joy.y = p.y; this.joy.dx = 0; this.joy.dy = 0; this.joy.mag = 0;
    } else {
      this.pointers.set(e.pointerId, { role: 'none', x: p.x, y: p.y });
    }
    e.preventDefault();
  }

  _move(e) {
    const ptr = this.pointers.get(e.pointerId);
    if (!ptr) return;
    const p = this._toLogical(e);
    ptr.x = p.x; ptr.y = p.y;
    if (ptr.role.startsWith('btn:')) {
      // ako prst sklizne sa dugmeta, otpusti ga (da se napad ne "zaglavi")
      const id = ptr.role.slice(4), b = this.buttons.find(b => b.id === id);
      if (b && Utils.dist2(p.x, p.y, b.x, b.y) > (b.r * 1.35) * (b.r * 1.35)) { this.touchDown.delete(id); ptr.role = 'none'; }
    } else if (ptr.role === 'joy') {
      let dx = p.x - this.joy.baseX, dy = p.y - this.joy.baseY;
      const len = Math.hypot(dx, dy) || 1;
      const clamped = Math.min(len, this.maxJoy);
      this.joy.dx = dx / len; this.joy.dy = dy / len;
      this.joy.mag = clamped / this.maxJoy;
      this.joy.x = this.joy.baseX + this.joy.dx * clamped;
      this.joy.y = this.joy.baseY + this.joy.dy * clamped;
    }
    e.preventDefault();
  }

  _up(e) {
    const ptr = this.pointers.get(e.pointerId);
    if (ptr) {
      if (ptr.role === 'joy') { this.joy.active = false; this.joy.mag = 0; this.joy.dx = 0; this.joy.dy = 0; this.joyId = null; }
      else if (ptr.role.startsWith('btn:')) this.touchDown.delete(ptr.role.slice(4));
      this.pointers.delete(e.pointerId);
    }
    if (e.pointerId === this.joyId) this.joyId = null;
    e.preventDefault();
  }

  // --- Upiti koje koristi ostatak igre ---
  // Vektor kretanja (-1..1), spojeni tastatura + joystick
  get move() {
    let x = 0, y = 0;
    if (this.keys.has('KeyA') || this.keys.has('ArrowLeft')) x -= 1;
    if (this.keys.has('KeyD') || this.keys.has('ArrowRight')) x += 1;
    if (this.keys.has('KeyW') || this.keys.has('ArrowUp')) y -= 1;
    if (this.keys.has('KeyS') || this.keys.has('ArrowDown')) y += 1;
    if (x || y) { const l = Math.hypot(x, y); return { x: x / l, y: y / l }; }
    if (this.joy.active && this.joy.mag > 0.12) return { x: this.joy.dx * this.joy.mag, y: this.joy.dy * this.joy.mag };
    return { x: 0, y: 0 };
  }

  get running() {
    return this.keys.has('ShiftLeft') || this.keys.has('ShiftRight') || (this.joy.active && this.joy.mag > 0.85);
  }

  // Da li je akcija upravo pritisnuta (jedan okidač)
  pressed(id) {
    if (this.touchEdge.has(id)) return true;
    for (const code in Input.KEYMAP)
      if (Input.KEYMAP[code] === id && this.keyEdge.has(code)) return true;
    return false;
  }

  // Da li je akcija trenutno držana (npr. napad)
  held(id) {
    if (this.touchDown.has(id)) return true;
    for (const code in Input.KEYMAP)
      if (Input.KEYMAP[code] === id && this.keys.has(code)) return true;
    return false;
  }

  // Pozvati na KRAJU svakog frejma da se obrišu "edge" događaji
  endFrame() { this.keyEdge.clear(); this.touchEdge.clear(); }
}

/* =========================================================================
 * world.js — Mapa: pozadina (jednom u offscreen platno), jazbina (safe zone),
 * zone hrane, tačke pojavljivanja neprijatelja, kavez. Global: World
 * ========================================================================= */
class World {
  constructor() {
    const C = CONFIG.colors;
    this.w = CONFIG.world.w; this.h = CONFIG.world.h;
    // Jazbina (kružna bezbedna zona) — levo-centralno
    this.burrow = { x: 700, y: 980, r: 210 };
    this.start = { x: this.burrow.x, y: this.burrow.y + 40 };
    // Zone u kojima raste hrana (svaka ima nekoliko tačaka)
    this.foodZones = [
      { x: 1180, y: 720, r: 120, n: 4 },
      { x: 1500, y: 1280, r: 140, n: 4 },
      { x: 1980, y: 1040, r: 130, n: 4 },
      { x: 980, y: 1320, r: 110, n: 3 },
    ];
    // Patrolne tačke običnih neprijatelja
    this.enemyPosts = [
      { x: 1320, y: 900 }, { x: 1650, y: 560 }, { x: 1750, y: 1320 }, { x: 1320, y: 1350 },
    ];
    // Kavez sa prijateljem + čuvari + boss (gore-desno, „dublji kanal")
    this.cage = { x: 2230, y: 380 };
    this.cageGuards = [{ x: 2090, y: 470 }, { x: 2330, y: 510 }];
    this.bossStart = { x: 2050, y: 760 };
    // Voda (dublji kanal) — vizuelno
    this.water = { x: 2050, y: 560, rx: 620, ry: 540 };
    this._decals = [];
    this._scatter();
    this.bg = this._buildBackground();
  }

  isInBurrow(x, y) { return Utils.dist2(x, y, this.burrow.x, this.burrow.y) < this.burrow.r * this.burrow.r; }

  // Drži entiteta unutar granica sveta
  clampWorld(e) {
    e.x = Utils.clamp(e.x, e.r, this.w - e.r);
    e.y = Utils.clamp(e.y, e.r, this.h - e.r);
  }

  // Gura entiteta van jazbine (za neprijatelje/bossa)
  pushOutOfBurrow(e) {
    const b = this.burrow, minD = b.r + e.r;
    const d = Utils.dist(e.x, e.y, b.x, b.y);
    if (d < minD && d > 0.001) {
      const nx = (e.x - b.x) / d, ny = (e.y - b.y) / d;
      e.x = b.x + nx * minD; e.y = b.y + ny * minD;
    }
  }

  _scatter() {
    // Determinističko raspoređivanje dekora (stabilan izgled)
    let seed = 1337;
    const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    const farFromBurrow = (x, y) => Utils.dist(x, y, this.burrow.x, this.burrow.y) > this.burrow.r + 50;
    for (let i = 0; i < 90; i++) {
      const x = rnd() * this.w, y = rnd() * this.h;
      if (!farFromBurrow(x, y)) continue;
      if (Utils.dist(x, y, this.cage.x, this.cage.y) < 90) continue;
      const t = rnd();
      if (t < 0.5) this._decals.push({ k: 'seaweed', x, y, h: 26 + rnd() * 26, p: rnd() * 6 });
      else if (t < 0.8) this._decals.push({ k: 'coral', x, y });
      else this._decals.push({ k: 'rock', x, y, r: 10 + rnd() * 16 });
    }
  }

  _buildBackground() {
    const C = CONFIG.colors;
    const cv = document.createElement('canvas');
    cv.width = this.w; cv.height = this.h;
    const ctx = cv.getContext('2d');

    // Pesak
    ctx.fillStyle = C.sand; ctx.fillRect(0, 0, this.w, this.h);
    let seed = 99;
    const rnd = () => { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; };
    ctx.fillStyle = C.sandDark; ctx.globalAlpha = 0.5;
    for (let i = 0; i < 700; i++) { ctx.beginPath(); ctx.arc(rnd() * this.w, rnd() * this.h, 2 + rnd() * 5, 0, 6.2832); ctx.fill(); }
    ctx.globalAlpha = 1;

    // Dublji kanal (voda)
    const wt = this.water;
    const grad = ctx.createRadialGradient(wt.x, wt.y, 50, wt.x, wt.y, wt.rx);
    grad.addColorStop(0, C.waterDeep); grad.addColorStop(0.7, C.waterShallow); grad.addColorStop(1, 'rgba(127,208,224,0)');
    ctx.fillStyle = grad; ctx.beginPath(); ctx.ellipse(wt.x, wt.y, wt.rx, wt.ry, 0, 0, 6.2832); ctx.fill();

    // Dekori
    for (const d of this._decals) {
      if (d.k === 'seaweed') Art.seaweed(ctx, d.x, d.y, d.h, Math.sin(d.p) * 6);
      else if (d.k === 'coral') Art.coralBush(ctx, d.x, d.y);
      else Art.rock(ctx, d.x, d.y, d.r);
    }

    // Oznake zona hrane (mehur prsten)
    for (const z of this.foodZones) {
      ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, 6.2832);
      ctx.strokeStyle = 'rgba(127,208,224,0.4)'; ctx.lineWidth = 3; ctx.setLineDash([10, 12]); ctx.stroke(); ctx.setLineDash([]);
    }

    this._drawBurrow(ctx);
    return cv;
  }

  _drawBurrow(ctx) {
    const C = CONFIG.colors, b = this.burrow;
    // Unutrašnji pesak (svetliji) + senka oboda
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.2832);
    ctx.fillStyle = '#efe0bd'; ctx.fill();
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(0,0,0,0.08)'; ctx.stroke();
    // Tepih sa zvezdom (kao u referenci)
    ctx.beginPath(); ctx.arc(b.x, b.y, 52, 0, 6.2832); ctx.fillStyle = '#7fae8f'; ctx.fill();
    ctx.strokeStyle = '#5e8c6e'; ctx.lineWidth = 4; ctx.stroke();
    ctx.fillStyle = '#e7a93a'; Art.star(ctx, b.x, b.y, 22);
    // Kameni zid (prsten od kamenova), sa otvorom za vrata (desno)
    const stones = 34;
    for (let i = 0; i < stones; i++) {
      const a = i / stones * Math.PI * 2;
      if (a > 0.18 && a < 0.72) continue;            // otvor (vrata) na desnoj strani
      const sx = b.x + Math.cos(a) * (b.r + 6), sy = b.y + Math.sin(a) * (b.r + 6);
      Art.rock(ctx, sx, sy, 15 + (i % 3) * 3);
    }
    // Zastava na zidu (gore)
    const fx = b.x + Math.cos(-1.4) * (b.r + 6), fy = b.y + Math.sin(-1.4) * (b.r + 6);
    ctx.strokeStyle = '#8a5a36'; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 46); ctx.stroke();
    ctx.fillStyle = '#3a93ad'; ctx.beginPath(); ctx.moveTo(fx, fy - 46); ctx.lineTo(fx + 30, fy - 40); ctx.lineTo(fx, fy - 30); ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#2c2419'; ctx.stroke();
    ctx.fillStyle = '#fff'; Art.star(ctx, fx + 9, fy - 38, 4);
  }
}

/* =========================================================================
 * entities.js — Player, Enemy (Kanto Mačevac), Boss (Morski Grgo),
 * Friend (Bubling), Pickup. Global klase.
 * ========================================================================= */
class Entity {
  constructor(x, y, r) { this.x = x; this.y = y; this.r = r; this.vx = 0; this.vy = 0; this.dead = false; this.animT = 0; this.hurtT = 0; }
  applyKnockback(fromX, fromY, force) {
    const d = Utils.dist(this.x, this.y, fromX, fromY) || 1;
    this.vx += (this.x - fromX) / d * force; this.vy += (this.y - fromY) / d * force;
  }
  integrate(dt) { this.x += this.vx * dt; this.y += this.vy * dt; this.vx *= 0.86; this.vy *= 0.86; }
}

/* ----------------------------------------------------------------- PLAYER */
class Player extends Entity {
  constructor(x, y) {
    super(x, y, CONFIG.player.radius);
    const p = CONFIG.player;
    this.health = p.startHealth; this.hunger = p.startHunger; this.stamina = p.startStamina;
    this.facing = -Math.PI / 2; this.moving = false;
    this.attackT = 0; this.attackCD = 0; this.invulnT = 0;
    this.isRunning = false; this.speedMult = 1;
  }
  update(dt, game) {
    const cfg = CONFIG.player, inp = game.input;
    this.animT += dt;
    this.attackT = Math.max(0, this.attackT - dt / cfg.attackDuration);
    this.attackCD = Math.max(0, this.attackCD - dt);
    this.invulnT = Math.max(0, this.invulnT - dt);
    this.hurtT = Math.max(0, this.hurtT - dt);

    // Kretanje
    const mv = inp.move;
    this.moving = (mv.x || mv.y) ? true : false;
    // Kazna za glad: spor i slab kad je gladan
    const hungry = this.hunger < CONFIG.hunger.lowThreshold;
    this.speedMult = hungry ? 0.82 : 1;
    this.isRunning = inp.running && this.stamina > 1 && this.moving && !hungry;
    let speed = cfg.walkSpeed * this.speedMult * (this.isRunning ? cfg.runMult : 1);
    if (this.moving) {
      this.x += mv.x * speed * dt;
      this.y += mv.y * speed * dt;
      this.facing = Math.atan2(mv.y, mv.x);
    }
    this.integrate(dt);
    game.world.clampWorld(this);

    // Napad (Space / dugme NAPAD)
    if (inp.held('attack') && this.attackCD <= 0 && this.stamina >= cfg.attackCost && !hungry) {
      this.attackT = 1; this.attackCD = cfg.attackCooldown;
      this.stamina -= cfg.attackCost;
      this.hunger = Math.max(0, this.hunger - CONFIG.hunger.attackExtra);
      game.onPlayerAttack(this);
    } else if (inp.held('attack') && this.attackCD <= 0 && hungry && this.stamina >= cfg.attackCost) {
      // slab napad kad je gladan (manja šteta, sporiji)
      this.attackT = 1; this.attackCD = cfg.attackCooldown * 1.5;
      this.stamina -= cfg.attackCost;
      this.hunger = Math.max(0, this.hunger - CONFIG.hunger.attackExtra);
      game.onPlayerAttack(this, 0.65);
    }
  }
  hurt(dmg, fromX, fromY, source, game) {
    if (this.invulnT > 0 || this.dead) return;
    this.health = Math.max(0, this.health - dmg);
    this.hurtT = 0.5; this.invulnT = CONFIG.player.invulnTime;
    this.applyKnockback(fromX, fromY, 130);
    game.lastDamageSource = source;
    game.shake = 8;
    if (this.health <= 0) this.dead = true;
  }
  get attackDamage() { return CONFIG.player.attackDamage; }
}

/* ----------------------------------------------------------------- ENEMY */
class Enemy extends Entity {
  constructor(x, y) {
    super(x, y, CONFIG.enemy.radius);
    this.health = CONFIG.enemy.health; this.facing = 0; this.moving = false;
    this.home = { x, y }; this.target = { x, y }; this.wanderT = 0;
    this.attackCD = 0; this.swinging = false; this.swingT = 0; this.didHit = false; this.attackAnim = 0;
    this.defeatT = 0; this.dropSignal = false;
  }
  update(dt, game) {
    this.animT += dt;
    this.hurtT = Math.max(0, this.hurtT - dt);
    if (this.defeatT > 0) {                  // animacija nestajanja
      this.defeatT -= dt;
      if (this.defeatT <= 0) this.dead = true;
      this.integrate(dt); return;
    }
    const cfg = CONFIG.enemy, p = game.player;
    const detect = game.dayNight.isNight ? cfg.detectRangeNight : cfg.detectRange;
    const spd = cfg.speed * (game.dayNight.isNight ? cfg.speedNightMult : 1);
    const dToP = Utils.dist(this.x, this.y, p.x, p.y);
    const playerSafe = game.world.isInBurrow(p.x, p.y);

    this.attackCD = Math.max(0, this.attackCD - dt);
    if (this.swinging) {
      this.swingT += dt; this.attackAnim = Utils.clamp(this.swingT / 0.55, 0, 1);
      if (this.swingT >= cfg.attackWindup && !this.didHit) {
        this.didHit = true;
        if (!game.world.isInBurrow(p.x, p.y) && Utils.dist(this.x, this.y, p.x, p.y) <= cfg.attackRange + 10)
          p.hurt(cfg.damage, this.x, this.y, 'enemy', game);
      }
      if (this.swingT >= 0.6) { this.swinging = false; this.attackAnim = 0; }
      this.moving = false;
    } else if (dToP < detect && !playerSafe) {       // juri igrača
      this.moving = true; this.facing = Utils.angle(this.x, this.y, p.x, p.y);
      if (dToP <= cfg.attackRange && this.attackCD <= 0) {
        this.swinging = true; this.swingT = 0; this.didHit = false; this.attackCD = cfg.attackCooldown;
      } else if (dToP > cfg.attackRange - 4) {
        this.x += Math.cos(this.facing) * spd * dt; this.y += Math.sin(this.facing) * spd * dt;
      }
    } else {                                          // patrola/lutanje
      this.wanderT -= dt;
      if (this.wanderT <= 0 || Utils.dist(this.x, this.y, this.target.x, this.target.y) < 16) {
        this.wanderT = Utils.rand(1.4, 3.2);
        this.target = { x: this.home.x + Utils.rand(-cfg.wanderRadius, cfg.wanderRadius), y: this.home.y + Utils.rand(-cfg.wanderRadius, cfg.wanderRadius) };
      }
      const a = Utils.angle(this.x, this.y, this.target.x, this.target.y);
      this.facing = a; this.moving = true;
      this.x += Math.cos(a) * spd * 0.55 * dt; this.y += Math.sin(a) * spd * 0.55 * dt;
    }
    this.integrate(dt);
    game.world.clampWorld(this);
    game.world.pushOutOfBurrow(this);
  }
  hurt(dmg, fromX, fromY, game) {
    if (this.defeatT > 0) return;
    this.health -= dmg; this.hurtT = 0.3;
    this.applyKnockback(fromX, fromY, CONFIG.enemy.knockback);
    if (this.health <= 0) this.die(game);
  }
  die(game) { this.defeatT = 0.6; game.onEnemyDefeated(this); }
}

/* ----------------------------------------------------------------- BOSS */
class Boss extends Entity {
  constructor(x, y) {
    super(x, y, CONFIG.boss.radius);
    this.health = CONFIG.boss.health; this.maxHealth = CONFIG.boss.health;
    this.facing = Math.PI; this.state = 'roam';
    this.home = { x, y }; this.target = { x, y }; this.wanderT = 0;
    this.chargeCD = CONFIG.boss.chargeCooldown; this.biteCD = 0;
    this.windupT = 0; this.actionT = 0; this.chargeDir = 0; this.attackAnim = 0;
    this.engaged = false; this.defeatTimer = 0;
  }
  update(dt, game) {
    const cfg = CONFIG.boss, p = game.player;
    this.animT += dt; this.hurtT = Math.max(0, this.hurtT - dt);
    if (this.state === 'defeated') {
      this.defeatTimer -= dt; this.integrate(dt);
      if (this.defeatTimer <= 0 && !this.dead) { this.dead = true; game.onBossDefeated(); }
      return;
    }
    this.chargeCD = Math.max(0, this.chargeCD - dt);
    this.biteCD = Math.max(0, this.biteCD - dt);
    const dToP = Utils.dist(this.x, this.y, p.x, p.y);
    const playerSafe = game.world.isInBurrow(p.x, p.y);
    this.engaged = dToP < cfg.detectRange + 80 && !playerSafe;

    if (this.state === 'windup') {
      this.windupT -= dt; this.attackAnim = 1;
      this.facing = Utils.angle(this.x, this.y, p.x, p.y);
      if (this.windupT <= 0) { this.state = 'charge'; this.actionT = cfg.chargeDuration; this.chargeDir = this.facing; }
    } else if (this.state === 'charge') {
      this.actionT -= dt;
      this.x += Math.cos(this.chargeDir) * cfg.chargeSpeed * dt;
      this.y += Math.sin(this.chargeDir) * cfg.chargeSpeed * dt;
      if (!playerSafe && Utils.circlesHit(this.x, this.y, this.r, p.x, p.y, p.r))
        p.hurt(cfg.chargeDamage, this.x, this.y, 'boss', game);
      if (this.actionT <= 0) { this.state = 'roam'; this.attackAnim = 0; this.chargeCD = cfg.chargeCooldown; }
    } else if (dToP < cfg.detectRange && !playerSafe) {   // juri
      this.state = 'chase'; this.facing = Utils.angle(this.x, this.y, p.x, p.y);
      if (this.chargeCD <= 0 && dToP > cfg.biteRange) { this.state = 'windup'; this.windupT = cfg.chargeWindup; }
      else {
        this.x += Math.cos(this.facing) * cfg.speed * dt; this.y += Math.sin(this.facing) * cfg.speed * dt;
        if (dToP <= cfg.biteRange && this.biteCD <= 0) {
          this.biteCD = cfg.biteCooldown; this.attackAnim = 1; this.state = 'bite';
          if (!playerSafe) p.hurt(cfg.biteDamage, this.x, this.y, 'boss', game);
        }
      }
    } else {                                              // lutanje kod kaveza
      this.state = 'roam'; this.attackAnim = Math.max(0, this.attackAnim - dt * 3);
      this.wanderT -= dt;
      if (this.wanderT <= 0 || Utils.dist(this.x, this.y, this.target.x, this.target.y) < 30) {
        this.wanderT = Utils.rand(2, 4);
        this.target = { x: this.home.x + Utils.rand(-220, 220), y: this.home.y + Utils.rand(-180, 180) };
      }
      this.facing = Utils.angle(this.x, this.y, this.target.x, this.target.y);
      this.x += Math.cos(this.facing) * cfg.speed * 0.5 * dt; this.y += Math.sin(this.facing) * cfg.speed * 0.5 * dt;
    }
    if (this.state === 'bite' && this.attackAnim > 0) { this.attackAnim -= dt * 3; if (this.attackAnim <= 0) this.state = 'chase'; }
    this.integrate(dt);
    game.world.clampWorld(this);
    game.world.pushOutOfBurrow(this);
  }
  hurt(dmg, fromX, fromY, game) {
    if (this.state === 'defeated') return;
    this.health -= dmg; this.hurtT = 0.25;
    this.applyKnockback(fromX, fromY, 40);
    if (this.health <= 0) { this.state = 'defeated'; this.defeatTimer = 1.4; this.health = 0; game.shake = 14; }
  }
}

/* ----------------------------------------------------------------- FRIEND (Bubling) */
class Friend extends Entity {
  constructor(x, y) { super(x, y, 16); this.state = 'caged'; this.name = 'Bubling'; }
  update(dt, game) {
    this.animT += dt;
    if (this.state === 'following') {
      const p = game.player;
      const tx = p.x - Math.cos(p.facing) * 42, ty = p.y - Math.sin(p.facing) * 42 - 10;
      this.x = Utils.lerp(this.x, tx, Math.min(1, dt * 6));
      this.y = Utils.lerp(this.y, ty, Math.min(1, dt * 6));
      if (game.world.isInBurrow(this.x, this.y)) { this.state = 'home'; game.onFriendHome(); }
    }
  }
}

/* ----------------------------------------------------------------- PICKUP */
class Pickup extends Entity {
  // kind: 'coral','shell','seaweed','stone','token','signal'
  constructor(x, y, kind, slot = null) { super(x, y, 14); this.kind = kind; this.slot = slot; this.taken = false; }
  update(dt) { this.animT += dt; }
}

  <script>
/* =========================================================================
 * systems.js — Sistemi igre (modularno, kao u opisu): glad, energija, zdravlje,
 * inventar, hrana, resursi, dan/noć, signal-zadatak, spasavanje, dekoracija.
 * ========================================================================= */

class HungerSystem {
  update(dt, game) {
    const p = game.player, h = CONFIG.hunger;
    let rate = game.dayNight.isNight ? h.decayNight : h.decayDay;
    if (p.isRunning) rate += h.runExtraPerSec;
    p.hunger = Utils.clamp(p.hunger - rate * dt, 0, CONFIG.player.maxHunger);
  }
}

class StaminaSystem {
  update(dt, game) {
    const p = game.player, s = CONFIG.stamina, h = CONFIG.hunger;
    if (p.isRunning) p.stamina -= CONFIG.player.runCostPerSec * dt;
    else {
      let regen = p.hunger > h.midThreshold ? s.regenFull : p.hunger > h.lowThreshold ? s.regenMid : s.regenLow;
      if (game.world.isInBurrow(p.x, p.y)) regen += s.burrowBonus;
      p.stamina += regen * dt;
    }
    p.stamina = Utils.clamp(p.stamina, 0, CONFIG.player.maxStamina);
  }
}

class HealthSystem {
  update(dt, game) {
    const p = game.player, hp = CONFIG.health;
    if (p.hunger <= 0) {                         // umire od gladi
      p.health -= hp.starveDrain * dt;
      if (!game.lastDamageSource || p.health <= 0) game.lastDamageSource = 'hunger';
    } else if (game.world.isInBurrow(p.x, p.y) && p.hunger > CONFIG.hunger.lowThreshold) {
      p.health += hp.burrowRegen * dt;           // isceljenje u jazbini
    }
    p.health = Utils.clamp(p.health, 0, CONFIG.player.maxHealth);
    if (p.health <= 0) p.dead = true;
  }
}

class InventorySystem {
  constructor() { this.items = { coral: 0, shell: 0, seaweed: 0, stone: 0, token: 0 }; }
  add(kind, n = 1) { if (kind in this.items) this.items[kind] += n; }
  has(kind, n = 1) { return (this.items[kind] || 0) >= n; }
  spend(kind, n = 1) { if (this.has(kind, n)) { this.items[kind] -= n; return true; } return false; }
}

class FoodSystem {
  // Pojedi najbolju dostupnu hranu (školjka > koral)
  eat(game) {
    const p = game.player, inv = game.inventory, f = CONFIG.food;
    if (p.hunger >= CONFIG.player.maxHunger - 0.5) { game.toast('Nisi gladan! 😊'); return false; }
    let kind = inv.has('shell') ? 'shell' : inv.has('coral') ? 'coral' : null;
    if (!kind) { game.toast('Nemaš hrane! Skupi korale 🪸 ili školjke 🐚'); return false; }
    inv.spend(kind, 1);
    p.hunger = Utils.clamp(p.hunger + f[kind].hunger, 0, CONFIG.player.maxHunger);
    p.stamina = Utils.clamp(p.stamina + f[kind].stamina, 0, CONFIG.player.maxStamina);
    game.toast(`Pojeo si ${f[kind].label}! +${f[kind].hunger} glad${f[kind].stamina ? `, +${f[kind].stamina} energija 💪` : ''}`);
    game.spawnEat(p.x, p.y);
    return true;
  }
}

class DayNightCycle {
  constructor() {
    const d = CONFIG.dayNight;
    this.phase = 'day'; this.t = 0; this.dayNum = 1; this.isNight = false;
    this.nightsSurvived = 0; this.total = d.totalNights;
  }
  get progress() { return this.t / (this.isNight ? CONFIG.dayNight.nightLength : CONFIG.dayNight.dayLength); }
  // 0 (svetlo) .. 1 (mrak) za zatamnjenje
  get darkness() {
    if (this.isNight) return 0.55 * Math.min(1, this.t * 2) * (this.t > CONFIG.dayNight.nightLength - 0.5 ? Math.max(0, (CONFIG.dayNight.nightLength - this.t) * 2) : 1);
    // sumrak na kraju dana
    const left = CONFIG.dayNight.dayLength - this.t;
    return left < 3 ? (3 - left) / 3 * 0.25 : 0;
  }
  update(dt, game) {
    const d = CONFIG.dayNight;
    this.t += dt;
    if (this.phase === 'day' && this.t >= d.dayLength) {
      this.phase = 'night'; this.t = 0; this.isNight = true; game.onNightStart(this.dayNum);
    } else if (this.phase === 'night' && this.t >= d.nightLength) {
      this.phase = 'day'; this.t = 0; this.isNight = false;
      this.nightsSurvived++; this.dayNum++; game.onNightEnd(this.nightsSurvived);
    }
  }
}

class QuestSignalSystem {
  constructor() {
    this.stage = 'survive';      // survive -> find -> return -> done
    this.hasSignal = false;
    this.pingT = 0;
    this.objective = 'Istraži, skupljaj hranu (🪸/🐚) i preživi! Vrati se u jazbinu kad si u opasnosti.';
  }
  // Meta tačka ka kojoj pokazuje strelica
  target(game) {
    // ako je signal ispušten a još nije pokupljen, vodi igrača do njega
    if (!this.hasSignal && game.signalDropped) {
      const sig = game.pickups.find(p => p.kind === 'signal');
      if (sig) return sig;
    }
    if (this.stage === 'find') return game.world.cage;
    if (this.stage === 'return') return game.world.burrow;
    if (this.stage === 'survive') {              // pokaži ka najbližoj zoni hrane
      let best = null, bd = Infinity;
      for (const z of game.world.foodZones) { const d = Utils.dist2(game.player.x, game.player.y, z.x, z.y); if (d < bd) { bd = d; best = z; } }
      return best;
    }
    return null;
  }
  giveSignal(game) {
    if (this.hasSignal) return;
    this.hasSignal = true; this.stage = 'find';
    this.objective = 'Imaš SIGNAL! Pritisni Q i prati strelicu do zarobljenog prijatelja 🫧';
    game.toast('Dobio si SIGNALNU ŠKOLJKU! Pritisni Q (📡) da nađeš prijatelja');
  }
  ping(game) {
    if (!this.hasSignal) { game.toast('Nemaš još signal! Pobedi neprijatelje da ga nađeš'); return; }
    this.pingT = 2.5;
    game.toast('Signal aktiviran — prati strelicu! ➡️');
  }
  update(dt) { this.pingT = Math.max(0, this.pingT - dt); }
}

class RescueSystem {
  tryRescue(game) {
    const p = game.player, w = game.world, fr = game.friend;
    if (!fr || fr.state !== 'caged') return false;
    if (Utils.dist(p.x, p.y, w.cage.x, w.cage.y) > 70) return false;
    if (game.guardsRemaining() > 0) { game.toast('Prvo pobedi čuvare oko kaveza! ⚔️'); return true; }
    fr.state = 'following';
    game.quest.stage = 'return';
    game.quest.objective = `Oslobodio si ${fr.name}! Odvedi ga nazad u jazbinu 🏠`;
    game.toast(`🎉 Oslobodio si ${fr.name}! Vodi ga kući (jazbina)`);
    game.shake = 6;
    return true;
  }
}

class DecorationSystem {
  constructor() {
    this.placed = [];
    // Mesta u jazbini gde se redom postavljaju dekoracije
    this.slots = [[-90, -70], [90, -70], [-110, 40], [110, 40], [0, 90]];
  }
  count() { return this.placed.length; }
  place(game) {
    const w = game.world, inv = game.inventory, c = CONFIG.decoration;
    if (!w.isInBurrow(game.player.x, game.player.y)) { game.toast('Dekoracije se postavljaju u jazbini! 🏠'); return; }
    if (this.placed.length >= this.slots.length) { game.toast('Jazbina je puna ukrasa! ✨'); return; }
    if (!inv.has('seaweed', c.cost.seaweed)) { game.toast(`Treba ti ${c.cost.seaweed}x alga 🌿 za ukras`); return; }
    inv.spend('seaweed', c.cost.seaweed);
    const slot = this.slots[this.placed.length];
    const type = c.types[this.placed.length % c.types.length];
    this.placed.push({ type, x: w.burrow.x + slot[0], y: w.burrow.y + slot[1] });
    game.toast('Postavljen ukras u jazbini! 🎨 (+1)');
  }
}

class SafeZoneSystem {
  isSafe(game, e) { return game.world.isInBurrow(e.x, e.y); }
}

/* =========================================================================
 * ui.js — UIManager: HUD, kontrole na ekranu (joystick + dugmad), strelica
 * zadatka, boss bar, poruke (toast), i ekrani (start/pauza/inventar/win/lose).
 * Sve se crta u EKRANSKIM (logičkim) koordinatama. Global: UIManager
 * ========================================================================= */
class UIManager {
  constructor() { this.menuButtons = []; this.font = 'system-ui, sans-serif'; this._lastObj = ''; this._objChangeAt = -9; }

  // ---- pomoćno crtanje ----
  panel(ctx, x, y, w, h, r = 12, a = 0.5) {
    ctx.fillStyle = `rgba(30,40,55,${a})`; Art.rr(ctx, x, y, w, h, r); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 2; ctx.stroke();
  }
  text(ctx, s, x, y, size, col = '#fff', align = 'left', weight = '700') {
    ctx.font = `${weight} ${size}px ${this.font}`; ctx.fillStyle = col; ctx.textAlign = align; ctx.textBaseline = 'middle';
    ctx.fillText(s, x, y);
  }
  wrap(ctx, s, x, y, size, maxW, col = '#fff', align = 'center') {
    ctx.font = `700 ${size}px ${this.font}`; ctx.fillStyle = col; ctx.textAlign = align; ctx.textBaseline = 'middle';
    const words = s.split(' '); let line = '', yy = y;
    for (const w of words) {
      const t = line ? line + ' ' + w : w;
      if (ctx.measureText(t).width > maxW && line) { ctx.fillText(line, x, yy); line = w; yy += size + 6; }
      else line = t;
    }
    ctx.fillText(line, x, yy); return yy;
  }
  heartPath(ctx, x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x, y, x - s * 0.5, y, x - s * 0.5, y + s * 0.3);
    ctx.bezierCurveTo(x - s * 0.5, y + s * 0.6, x, y + s * 0.85, x, y + s);
    ctx.bezierCurveTo(x, y + s * 0.85, x + s * 0.5, y + s * 0.6, x + s * 0.5, y + s * 0.3);
    ctx.bezierCurveTo(x + s * 0.5, y, x, y, x, y + s * 0.3);
    ctx.closePath();
  }

  // ===================================================== HUD (tokom igre)
  drawHUD(ctx, game) {
    const C = CONFIG.colors, p = game.player, W = CONFIG.view.w;
    // --- levo: avatar, srca, energija, glad ---
    this.panel(ctx, 10, 10, 312, 116, 14, 0.42);
    this._avatar(ctx, 48, 52, 30);
    // srca
    const hpEach = CONFIG.player.maxHealth / 5;
    for (let i = 0; i < 5; i++) {
      const x = 92 + i * 30, y = 26, frac = Utils.clamp((p.health - i * hpEach) / hpEach, 0, 1);
      this.heartPath(ctx, x, y, 22); ctx.fillStyle = '#5b3a3a'; ctx.fill();
      if (frac > 0) { ctx.save(); this.heartPath(ctx, x, y, 22); ctx.clip(); ctx.fillStyle = C.heart; ctx.fillRect(x - 12, y, 24 * frac, 24); ctx.restore(); }
      ctx.lineWidth = 1.5; ctx.strokeStyle = '#2c2419'; this.heartPath(ctx, x, y, 22); ctx.stroke();
    }
    // energija (mehurići)
    const stEach = CONFIG.player.maxStamina / 5;
    for (let i = 0; i < 5; i++) {
      const x = 92 + i * 28, y = 70, frac = Utils.clamp((p.stamina - i * stEach) / stEach, 0, 1);
      ctx.beginPath(); ctx.arc(x, y, 9, 0, 6.2832); ctx.fillStyle = 'rgba(255,255,255,0.18)'; ctx.fill();
      if (frac > 0.05) { ctx.beginPath(); ctx.arc(x, y, 9 * Math.max(0.35, frac), 0, 6.2832); ctx.fillStyle = C.stamina; ctx.fill(); }
      ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.beginPath(); ctx.arc(x, y, 9, 0, 6.2832); ctx.stroke();
    }
    // glad (istaknuta traka — glavna mehanika)
    const hf = p.hunger / CONFIG.player.maxHunger, low = p.hunger < CONFIG.hunger.lowThreshold;
    const blink = low && Math.floor(game.time * 4) % 2 === 0;
    this.text(ctx, 'GLAD', 92, 100, 12, blink ? '#ffd24a' : '#cfe', 'left');
    const bx = 134, bw = 174;
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; Art.rr(ctx, bx, 92, bw, 16, 8); ctx.fill();
    const col = hf > 0.5 ? '#6ec06e' : hf > 0.25 ? '#e8b54a' : '#e8503a';
    ctx.fillStyle = col; Art.rr(ctx, bx, 92, Math.max(2, bw * hf), 16, 8); ctx.fill();
    this.coralIcon(ctx, bx - 2, 100, 0); // sitna ikonica
    if (low) this.text(ctx, '⚠ GLADAN!', bx + bw / 2, 100, 11, '#fff', 'center');

    // --- centar gore: brojač noći ---
    this._nightCounter(ctx, game, W / 2, 18);

    // --- resursi (centar, ispod noći) ---
    const items = [['coral', '🪸'], ['shell', '🐚'], ['seaweed', '🌿'], ['stone', '🪨'], ['token', '⭐']];
    const rx0 = W / 2 - (items.length * 56) / 2 + 28;
    this.panel(ctx, W / 2 - 150, 78, 300, 30, 10, 0.4);
    items.forEach(([k, g], i) => {
      const x = rx0 + i * 56;
      this.text(ctx, g, x - 14, 93, 16, '#fff', 'center');
      this.text(ctx, '×' + game.inventory.items[k], x + 8, 93, 14, '#fff', 'left');
    });

    // --- zadatak (objective) — pulsira kad se promeni ---
    if (game.quest.objective !== this._lastObj) { this._lastObj = game.quest.objective; this._objChangeAt = game.time; }
    const fresh = game.time - this._objChangeAt < 1.4;
    const opulse = fresh && Math.floor(game.time * 6) % 2 === 0;
    this.panel(ctx, W / 2 - 330, 116, 660, 42, 12, opulse ? 0.78 : 0.5);
    if (opulse) { ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 3; Art.rr(ctx, W / 2 - 330, 116, 660, 42, 12); ctx.stroke(); }
    this.wrap(ctx, '🎯 ' + game.quest.objective, W / 2, 137, 17, 624, fresh ? '#fff3c4' : '#fff');
    // brojač čuvara kod kaveza (kad imaš signal a prijatelj je još zarobljen)
    if (game.quest.hasSignal && game.friend.state === 'caged') {
      const gr = game.guardsRemaining();
      if (gr > 0) this.text(ctx, `⚔️ Pobedi čuvare kod kaveza: ${gr}`, W / 2, 170, 14, '#ffd24a', 'center');
    }

    // --- boss bar ---
    if (game.boss && !game.boss.dead && game.boss.engaged) this._bossBar(ctx, game);

    // --- toasts ---
    this._toasts(ctx, game);

    // --- kontrole ---
    if (game.input.touchActive) this.drawTouchControls(ctx, game);
    else this._keyHints(ctx);
  }

  _avatar(ctx, x, y, r) {
    ctx.save(); ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832);
    ctx.fillStyle = '#7fd0e0'; ctx.fill(); ctx.clip();
    // mini lice
    ctx.fillStyle = CONFIG.colors.skin; ctx.beginPath(); ctx.arc(x, y + 4, r * 0.7, 0, 6.2832); ctx.fill();
    ctx.fillStyle = CONFIG.colors.hair; ctx.beginPath(); ctx.arc(x, y - r * 0.3, r * 0.6, Math.PI, 0); ctx.fill();
    ctx.fillStyle = '#2c2419'; ctx.beginPath(); ctx.arc(x - 6, y + 2, 2.5, 0, 6.2832); ctx.arc(x + 6, y + 2, 2.5, 0, 6.2832); ctx.fill();
    ctx.strokeStyle = '#2c2419'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y + 6, 6, 0.2, Math.PI - 0.2); ctx.stroke();
    ctx.restore();
    ctx.lineWidth = 3; ctx.strokeStyle = '#e8a23a'; ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.stroke();
  }

  _nightCounter(ctx, game, cx, y) {
    const dn = game.dayNight;
    this.panel(ctx, cx - 90, y, 180, 52, 12, 0.45);
    // mesec/sunce
    ctx.beginPath(); ctx.arc(cx - 60, y + 26, 17, 0, 6.2832);
    ctx.fillStyle = dn.isNight ? '#dfe6ff' : '#ffd54a'; ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#2c2419'; ctx.stroke();
    if (dn.isNight) { ctx.fillStyle = '#0b1f4d'; ctx.beginPath(); ctx.arc(cx - 54, y + 22, 14, 0, 6.2832); ctx.fill(); }
    this.text(ctx, dn.isNight ? 'NOĆ' : 'DAN', cx + 18, y + 16, 15, '#fff', 'center');
    this.text(ctx, `${Math.min(dn.dayNum, dn.total)} / ${dn.total}`, cx + 18, y + 36, 17, dn.isNight ? '#9fb8ff' : '#ffe08a', 'center');
    // traka faze
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; Art.rr(ctx, cx - 36, y + 42, 110, 5, 2.5); ctx.fill();
    ctx.fillStyle = dn.isNight ? '#6f86d6' : '#ffd54a'; Art.rr(ctx, cx - 36, y + 42, 110 * Utils.clamp(dn.progress, 0, 1), 5, 2.5); ctx.fill();
  }

  _bossBar(ctx, game) {
    const W = CONFIG.view.w, H = CONFIG.view.h, b = game.boss, y = H - 96;
    this.panel(ctx, W / 2 - 230, y, 460, 36, 10, 0.55);
    ctx.beginPath(); ctx.arc(W / 2 - 210, y + 18, 15, 0, 6.2832); ctx.fillStyle = CONFIG.colors.boss; ctx.fill(); ctx.lineWidth = 2; ctx.strokeStyle = '#2c2419'; ctx.stroke();
    this.text(ctx, 'MORSKI GRGO', W / 2 - 188, y + 12, 12, '#fff', 'left');
    const bx = W / 2 - 188, bw = 396;
    ctx.fillStyle = '#3a1418'; Art.rr(ctx, bx, y + 18, bw, 12, 6); ctx.fill();
    ctx.fillStyle = '#e8503a'; Art.rr(ctx, bx, y + 18, Math.max(0, bw * (b.health / b.maxHealth)), 12, 6); ctx.fill();
  }

  _toasts(ctx, game) {
    const W = CONFIG.view.w; let y = CONFIG.view.h - 150;
    for (let i = game.toasts.length - 1; i >= 0; i--) {
      const t = game.toasts[i], a = Math.min(1, t.life);
      ctx.globalAlpha = a;
      const w = Math.min(560, ctx.measureText(t.msg).width + 40);
      this.panel(ctx, W / 2 - 300, y, 600, 34, 10, 0.6 * a);
      this.text(ctx, t.msg, W / 2, y + 17, 16, '#fff', 'center');
      ctx.globalAlpha = 1; y -= 40;
    }
  }

  _keyHints(ctx) {
    const H = CONFIG.view.h;
    this.text(ctx, 'WASD/strelice: kreći se   Shift: trči   Space: napad   E: spasi   F: jedi   Q: signal   Tab: inventar   B: ukrasi   Esc: pauza',
      CONFIG.view.w / 2, H - 16, 13, 'rgba(255,255,255,0.75)', 'center', '600');
  }

  // ===================================================== KONTROLE NA EKRANU
  drawTouchControls(ctx, game) {
    const inp = game.input;
    // joystick
    if (inp.joy.active) {
      ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(inp.joy.baseX, inp.joy.baseY, inp.maxJoy, 0, 6.2832); ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.stroke();
      ctx.beginPath(); ctx.arc(inp.joy.x, inp.joy.y, 34, 0, 6.2832); ctx.fillStyle = 'rgba(127,208,224,0.8)'; ctx.fill(); ctx.stroke();
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.25;
      ctx.beginPath(); ctx.arc(150, CONFIG.view.h - 150, inp.maxJoy, 0, 6.2832); ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke();
      this.text(ctx, 'kreći', 150, CONFIG.view.h - 150, 14, '#fff', 'center');
      ctx.globalAlpha = 1;
    }
    // dugmad
    for (const b of inp.buttons) {
      if (b.onlyBurrow && !inp.showDecorate) continue;
      const held = inp.held(b.id);
      const cooling = b.id === 'attack' && game.player && game.player.attackCD > 0;
      ctx.globalAlpha = (b.small ? 0.7 : 0.85) * (cooling ? 0.5 : 1);
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 6.2832);
      ctx.fillStyle = held ? '#fff' : b.color; ctx.fill();
      ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();
      ctx.globalAlpha = 1;
      const lab = b.glyph || b.label;
      this.text(ctx, lab, b.x, b.y, b.small ? 22 : (b.id === 'attack' ? 20 : 16), held ? '#2c2419' : '#fff', 'center');
      if (!b.small && b.id !== 'attack') this.text(ctx, b.label, b.x, b.y + 16, 11, held ? '#2c2419' : '#fff', 'center');
    }
  }

  // ===================================================== SVETSKI OVERLAY (strelica)
  drawWorldOverlay(ctx, game, cam) {
    const p = game.player, q = game.quest, W = CONFIG.view.w, H = CONFIG.view.h;
    // --- kućni far: pokaži pravac jazbine kad je van ekrana ---
    if (!game.world.isInBurrow(p.x, p.y)) {
      const br = game.world.burrow, hx = br.x - cam.x, hy = br.y - cam.y;
      if (hx < 36 || hx > W - 36 || hy < 96 || hy > H - 100) {
        const cxs = Utils.clamp(hx, 36, W - 36), cys = Utils.clamp(hy, 96, H - 100);
        ctx.save(); ctx.globalAlpha = 0.9;
        ctx.beginPath(); ctx.arc(cxs, cys, 17, 0, 6.2832); ctx.fillStyle = 'rgba(60,147,173,0.92)'; ctx.fill();
        ctx.lineWidth = 2; ctx.strokeStyle = '#fff'; ctx.stroke();
        this.text(ctx, '🏠', cxs, cys + 1, 17, '#fff', 'center');
        ctx.restore();
      }
    }
    // --- strelica zadatka ---
    const tgt = q.target(game);
    if (!tgt) return;
    const sx = p.x - cam.x, sy = p.y - cam.y - 46;
    const a = Utils.angle(p.x, p.y, tgt.x, tgt.y);
    const pulse = q.pingT > 0 ? 1.25 + Math.sin(game.time * 16) * 0.15 : 1;
    const dist = Utils.dist(p.x, p.y, tgt.x, tgt.y);
    if (dist < 80) return;
    ctx.save(); ctx.translate(sx, sy); ctx.rotate(a); ctx.scale(pulse, pulse);
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = q.pingT > 0 ? '#ffd24a' : '#f4c842';
    ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(2, -12); ctx.lineTo(6, 0); ctx.lineTo(2, 12); ctx.closePath(); ctx.fill();
    ctx.lineWidth = 2; ctx.strokeStyle = '#2c2419'; ctx.stroke();
    ctx.restore(); ctx.globalAlpha = 1;
  }

  // ===================================================== EKRANI
  screen(ctx, game) {
    this.menuButtons = [];
    const W = CONFIG.view.w, H = CONFIG.view.h;
    if (game.state === 'start') {
      this._bg(ctx, '#103a5a');
      this.text(ctx, '99 NOĆI U KORALU', W / 2, H * 0.26, 64, '#ffd24a', 'center', '800');
      this.text(ctx, '2D podvodna survival avantura', W / 2, H * 0.26 + 48, 22, '#bfe6f0', 'center');
      this.wrap(ctx, 'Preživi 3 noći • jedi korale i školjke da ne ogladniš • pobedi kanto-mačevce • nađi signal • spasi Bublinga • ukrasi jazbinu!', W / 2, H * 0.44, 18, 760, '#e8f6fb');
      this.text(ctx, game.input.touchActive
        ? '🕹️ levo = kretanje    •    desna dugmad = NAPAD · E (spasi) · JEDI · SIGNAL'
        : '⌨️ WASD = kretanje · Space = napad · E = spasi · F = jedi · Q = signal · B = ukrasi',
        W / 2, H * 0.54, 16, '#bfe6f0', 'center', '600');
      this._btn(ctx, 'IGRAJ ▶', W / 2, H * 0.64, 'start');
      this.text(ctx, game.input.touchActive ? 'Tapni IGRAJ' : 'Pritisni IGRAJ ili ENTER', W / 2, H * 0.64 + 64, 15, 'rgba(255,255,255,0.7)', 'center');
    } else if (game.state === 'paused') {
      this._dim(ctx); this.text(ctx, 'PAUZA', W / 2, H * 0.34, 56, '#fff', 'center', '800');
      this._btn(ctx, 'NASTAVI', W / 2, H * 0.5, 'resume');
      this._btn(ctx, 'IZNOVA', W / 2, H * 0.5 + 86, 'restart', '#9b6fc4');
    } else if (game.state === 'inventory') {
      this._dim(ctx); this._inventory(ctx, game);
    } else if (game.state === 'win') {
      this._bg(ctx, '#0e5a3a');
      this.text(ctx, '🎉 POBEDA! 🎉', W / 2, H * 0.28, 60, '#ffd24a', 'center', '800');
      this.wrap(ctx, `Preživeo si ${CONFIG.dayNight.totalNights} noći, spasio Bublinga i ukrasio jazbinu!`, W / 2, H * 0.44, 22, 720, '#e8f6fb');
      this.text(ctx, `Spašeni prijatelji: ${game.friend && game.friend.state !== 'caged' ? 1 : 0}   •   Ukrasi: ${game.decoration.count()}   •   Boss: ${game.bossDefeated ? 'pobeđen!' : 'pobegao'}`, W / 2, H * 0.55, 17, '#bfe6f0', 'center');
      this._btn(ctx, 'IGRAJ PONOVO', W / 2, H * 0.68, 'restart');
    } else if (game.state === 'lose') {
      this._bg(ctx, '#3a1620');
      this.text(ctx, 'KRAJ IGRE', W / 2, H * 0.3, 58, '#e8503a', 'center', '800');
      this.wrap(ctx, game.loseReason, W / 2, H * 0.45, 22, 720, '#f6dde2');
      this._btn(ctx, 'PROBAJ PONOVO', W / 2, H * 0.65, 'restart');
    }
  }

  _inventory(ctx, game) {
    const W = CONFIG.view.w, H = CONFIG.view.h;
    this.panel(ctx, W / 2 - 280, H / 2 - 200, 560, 400, 18, 0.85);
    this.text(ctx, '🎒 INVENTAR', W / 2, H / 2 - 165, 32, '#ffd24a', 'center', '800');
    const inv = game.inventory.items;
    const rows = [
      ['🪸 Koral (hrana +15 glad)', inv.coral],
      ['🐚 Školjka (hrana +35 glad, +20 energija)', inv.shell],
      ['🌿 Alga (za ukrašavanje)', inv.seaweed],
      ['🪨 Kamen (resurs)', inv.stone],
      ['⭐ Token (specijalni)', inv.token],
    ];
    rows.forEach((r, i) => {
      const y = H / 2 - 110 + i * 46;
      this.panel(ctx, W / 2 - 250, y - 18, 500, 38, 8, 0.3);
      this.text(ctx, r[0], W / 2 - 235, y, 18, '#fff', 'left');
      this.text(ctx, '×' + r[1], W / 2 + 230, y, 20, '#ffd24a', 'right');
    });
    this.text(ctx, game.quest.hasSignal ? '📡 Imaš signalnu školjku!' : '📡 Signal: još ga nemaš', W / 2, H / 2 + 135, 16, '#bfe6f0', 'center');
    this._btn(ctx, 'ZATVORI', W / 2, H / 2 + 172, 'resume', '#7b828c', 150, 40);
  }

  _btn(ctx, label, cx, cy, action, color = '#f08a3c', w = 280, h = 64) {
    Art.rr(ctx, cx - w / 2, cy - h / 2, w, h, 14); ctx.fillStyle = color; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.stroke();
    this.text(ctx, label, cx, cy, h > 50 ? 26 : 18, '#fff', 'center', '800');
    this.menuButtons.push({ x: cx - w / 2, y: cy - h / 2, w, h, action });
  }
  _bg(ctx, col) {
    const g = ctx.createLinearGradient(0, 0, 0, CONFIG.view.h);
    g.addColorStop(0, col); g.addColorStop(1, '#06243a'); ctx.fillStyle = g;
    ctx.fillRect(0, 0, CONFIG.view.w, CONFIG.view.h);
    // mehurići dekor
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    for (let i = 0; i < 30; i++) ctx.beginPath(), ctx.arc((i * 137) % CONFIG.view.w, (i * 211) % CONFIG.view.h, 4 + (i % 5) * 3, 0, 6.2832), ctx.fill();
  }
  _dim(ctx) { ctx.fillStyle = 'rgba(6,20,30,0.72)'; ctx.fillRect(0, 0, CONFIG.view.w, CONFIG.view.h); }

  coralIcon(ctx, x, y, t) {
    ctx.save(); ctx.translate(x, y); ctx.scale(0.5, 0.5);
    ctx.strokeStyle = CONFIG.colors.coralPink; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, 8); ctx.lineTo(0, -8); ctx.moveTo(-4, 6); ctx.lineTo(-6, -4); ctx.moveTo(4, 6); ctx.lineTo(6, -4); ctx.stroke();
    ctx.restore();
  }
}

</script>
  <script>
/* =========================================================================
 * game.js — GameManager: glavna petlja, povezivanje sistema, spawnovi,
 * borba, win/lose, kamera, efekti, zvuk i pokretanje. Global: GameManager
 * ========================================================================= */
class GameManager {
  constructor(canvas) {
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.input = new Input(canvas);
    this.ui = new UIManager();
    this.world = new World();
    // sistemi
    this.hungerSys = new HungerSystem();
    this.staminaSys = new StaminaSystem();
    this.healthSys = new HealthSystem();
    this.foodSys = new FoodSystem();
    this.rescueSys = new RescueSystem();
    this.safeZone = new SafeZoneSystem();
    this.state = 'start';
    this.cam = { x: 0, y: 0 };
    this._initAudio();
    this.reset();
    this._bindMenu();
  }

  reset() {
    const w = this.world;
    this.player = new Player(w.start.x, w.start.y);
    this.inventory = new InventorySystem();
    this.dayNight = new DayNightCycle();
    this.quest = new QuestSignalSystem();
    this.decoration = new DecorationSystem();
    this.enemies = [];
    for (const pos of w.enemyPosts) this.enemies.push(new Enemy(pos.x, pos.y));
    for (const pos of w.cageGuards) { const e = new Enemy(pos.x, pos.y); e.isGuard = true; this.enemies.push(e); }
    this.boss = new Boss(w.bossStart.x, w.bossStart.y);
    this.friend = new Friend(w.cage.x, w.cage.y - 4);
    this.pickups = []; this.effects = []; this.toasts = [];
    this.foodSlots = [];
    for (const z of w.foodZones)
      for (let i = 0; i < z.n; i++) {
        const a = Math.random() * 7, rr = Math.random() * z.r * 0.85;
        this.foodSlots.push({ x: z.x + Math.cos(a) * rr, y: z.y + Math.sin(a) * rr, active: false, cooldown: 0 });
      }
    for (const s of this.foodSlots) this._spawnFood(s);
    // par besplatnih algi u jazbini — dete može odmah da ukrasi (bez borbe)
    const b = w.burrow;
    this.pickups.push(new Pickup(b.x - 70, b.y - 120, 'seaweed'));
    this.pickups.push(new Pickup(b.x + 80, b.y - 110, 'seaweed'));
    this.time = 0; this.shake = 0; this.lastDamageSource = null;
    this.signalDropped = false; this.bossDefeated = false; this.loseReason = '';
  }

  // ============================================================= MENI / UNOS
  _bindMenu() {
    this.canvas.addEventListener('pointerdown', e => {
      if (!['start', 'paused', 'inventory', 'win', 'lose'].includes(this.state)) return;
      const r = this.canvas.getBoundingClientRect();
      const x = (e.clientX - r.left) / r.width * CONFIG.view.w, y = (e.clientY - r.top) / r.height * CONFIG.view.h;
      for (const b of this.ui.menuButtons)
        if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { this._menuAction(b.action); return; }
    });
  }
  _menuAction(a) {
    this._resumeAudio();
    if (a === 'start' || a === 'restart') { if (a === 'restart') this.reset(); this.state = 'playing'; }
    else if (a === 'resume') this.state = 'playing';
  }

  handleStateInput() {
    const inp = this.input;
    if (this.state === 'start') { if (inp.pressed('confirm')) this._menuAction('start'); }
    else if (this.state === 'win' || this.state === 'lose') { if (inp.pressed('confirm')) this._menuAction('restart'); }
    else if (this.state === 'paused') { if (inp.pressed('pause') || inp.pressed('confirm')) this.state = 'playing'; }
    else if (this.state === 'inventory') { if (inp.pressed('inventory') || inp.pressed('pause')) this.state = 'playing'; }
    else if (this.state === 'playing') {
      if (inp.pressed('pause')) { this.state = 'paused'; return; }
      if (inp.pressed('inventory')) { this.state = 'inventory'; return; }
      if (inp.pressed('eat')) this.foodSys.eat(this);
      if (inp.pressed('signal')) this.quest.ping(this);
      if (inp.pressed('interact')) this.rescueSys.tryRescue(this);
      if (inp.pressed('decorate')) this.decoration.place(this);
    }
  }

  // ============================================================= UPDATE
  update(dt) {
    this.time += dt;
    this.handleStateInput();
    if (this.state === 'playing') this._updatePlay(dt);
    // toasts blede uvek
    for (const t of this.toasts) t.life -= dt;
    this.toasts = this.toasts.filter(t => t.life > 0);
    this.input.endFrame();
  }

  _updatePlay(dt) {
    const p = this.player, w = this.world;
    p.update(dt, this);
    for (const e of this.enemies) e.update(dt, this);
    this.boss.update(dt, this);
    this.friend.update(dt, this);
    for (const pk of this.pickups) pk.update(dt);
    this.hungerSys.update(dt, this);
    this.staminaSys.update(dt, this);
    this.healthSys.update(dt, this);
    this.dayNight.update(dt, this);
    this.quest.update(dt);

    this._collectPickups();
    this._updateFood(dt);
    this.enemies = this.enemies.filter(e => !e.dead);

    // efekti
    for (const fx of this.effects) { fx.t += dt; }
    this.effects = this.effects.filter(fx => fx.t < fx.life);

    // kamera prati igrača
    const vw = CONFIG.view.w, vh = CONFIG.view.h;
    this.cam.x = Utils.clamp(p.x - vw / 2, 0, Math.max(0, w.w - vw));
    this.cam.y = Utils.clamp(p.y - vh / 2, 0, Math.max(0, w.h - vh));
    this.shake = Math.max(0, this.shake - dt * 30);
    this.input.showDecorate = w.isInBurrow(p.x, p.y);

    // win/lose
    if (p.dead || p.health <= 0) this._lose();
    else if (this.dayNight.nightsSurvived >= this.dayNight.total &&
      this.friend.state !== 'caged' && this.decoration.count() >= 1) this.state = 'win';
  }

  _lose() {
    this.state = 'lose';
    const src = this.lastDamageSource;
    this.loseReason = src === 'hunger' ? 'Umro si od gladi! Sledeći put jedi više korala i školjki (F). 🪸'
      : src === 'boss' ? 'Morski Grgo te je savladao! Beži u jazbinu kad si u opasnosti. 🐻'
        : 'Neprijatelji su te savladali! Pazi na zdravlje i vrati se u jazbinu. ⚔️';
  }

  // ============================================================= POMOĆNO
  toast(msg) { this.toasts.push({ msg, life: 3.2 }); if (this.toasts.length > 3) this.toasts.shift(); }
  guardsRemaining() { return this.enemies.filter(e => e.isGuard && !e.dead && e.defeatT <= 0).length; }

  _spawnFood(slot) {
    const kind = Math.random() < 0.3 ? 'shell' : 'coral';
    slot.active = true;
    this.pickups.push(new Pickup(slot.x, slot.y, kind, slot));
  }
  _updateFood(dt) {
    for (const s of this.foodSlots) if (!s.active) { s.cooldown -= dt; if (s.cooldown <= 0) this._spawnFood(s); }
  }
  _collectPickups() {
    const p = this.player;
    for (const pk of this.pickups) {
      if (pk.taken) continue;
      if (Utils.dist(p.x, p.y, pk.x, pk.y) < p.r + pk.r + 8) {
        pk.taken = true;
        if (pk.kind === 'signal') { this.quest.giveSignal(this); this.sfx('pickup'); }
        else { this.inventory.add(pk.kind, 1); this.sfx('pickup'); this._pop(pk.x, pk.y, this._emoji(pk.kind)); }
        if (pk.slot) { pk.slot.active = false; pk.slot.cooldown = CONFIG.spawns.foodRespawn; }
      }
    }
    this.pickups = this.pickups.filter(pk => !pk.taken);
  }
  _emoji(k) { return { coral: '🪸', shell: '🐚', seaweed: '🌿', stone: '🪨', token: '⭐' }[k] || '+1'; }
  _pop(x, y, txt) { this.effects.push({ type: 'pop', x, y, txt, t: 0, life: 0.9 }); }
  spawnEat(x, y) { this.effects.push({ type: 'eat', x, y, t: 0, life: 0.6 }); }

  // ============================================================= CALLBACKS
  onPlayerAttack(player, mult = 1) {
    const cfg = CONFIG.player, dmg = cfg.attackDamage * mult;
    this.sfx('swing');
    this.effects.push({ type: 'swing', x: player.x, y: player.y, facing: player.facing, t: 0, life: 0.2 });
    let hit = false;
    for (const e of this.enemies)
      if (e.defeatT <= 0 && Utils.inArc(e.x, e.y, player.x, player.y, player.facing, cfg.attackRange, cfg.attackArc)) { e.hurt(dmg, player.x, player.y, this); hit = true; }
    const b = this.boss;
    if (b && b.state !== 'defeated' && !b.dead && Utils.inArc(b.x, b.y, player.x, player.y, player.facing, cfg.attackRange + b.r * 0.5, cfg.attackArc)) { b.hurt(dmg, player.x, player.y, this); hit = true; }
    if (hit) this.sfx('hit');
  }
  onEnemyDefeated(e) {
    this.sfx('defeat');
    this._pop(e.x, e.y - 10, '💥');
    // plen
    this._dropLoot(e.x, e.y);
    if (!this.signalDropped) { this.signalDropped = true; this.pickups.push(new Pickup(e.x + 14, e.y, 'signal')); this.toast('Neprijatelj je ispustio SIGNAL! Pokupi ga 📡'); }
  }
  _dropLoot(x, y) {
    const drops = [Math.random() < 0.5 ? 'shell' : 'coral', 'seaweed'];
    if (Math.random() < 0.4) drops.push('stone');
    if (Math.random() < 0.25) drops.push('token');
    drops.forEach((k, i) => { const a = Math.random() * 7; this.pickups.push(new Pickup(x + Math.cos(a) * (18 + i * 8), y + Math.sin(a) * (18 + i * 8), k)); });
  }
  onBossDefeated() { this.bossDefeated = true; this.toast('🎉 Pobedio si Morskog Grgu!'); this.inventory.add('token', 3); this.sfx('win'); }
  onNightStart(dayNum) {
    this.toast(`🌙 Noć ${Math.min(dayNum, this.dayNight.total)} počinje! Neprijatelji su brži i opasniji.`); this.sfx('night');
    const b = this.world.burrow;
    for (let i = 0; i < CONFIG.dayNight.nightEnemyExtra; i++) {
      const a = Math.random() * 7, d = b.r + 180 + Math.random() * 120;
      const e = new Enemy(b.x + Math.cos(a) * d, b.y + Math.sin(a) * d); e.isNight = true; this.enemies.push(e);
    }
  }
  onNightEnd(nights) {
    this.toast(`☀️ Preživeo si noć ${nights}! ${nights >= this.dayNight.total ? 'Svaka čast!' : 'Nastavi!'}`); this.sfx('day');
    this.enemies = this.enemies.filter(e => !e.isNight); // noćni nestaju u zoru
  }
  onFriendHome() { this.toast('🏠 Bubling je bezbedan u jazbini! Bravo!'); this.quest.objective = 'Bublinga si spasio! Ukrasi jazbinu (B/✨) i preživi do kraja 3. noći.'; }

  // ============================================================= RENDER
  render() {
    const ctx = this.ctx, cv = this.canvas, vw = CONFIG.view.w, vh = CONFIG.view.h;
    ctx.setTransform(cv.width / vw, 0, 0, cv.height / vh, 0, 0);
    ctx.clearRect(0, 0, vw, vh);

    if (this.state === 'start') { this.ui.screen(ctx, this); return; }

    const sx = (Math.random() - 0.5) * this.shake, sy = (Math.random() - 0.5) * this.shake;
    let cx = Utils.clamp(this.cam.x + sx, 0, Math.max(0, this.world.w - vw));
    let cy = Utils.clamp(this.cam.y + sy, 0, Math.max(0, this.world.h - vh));

    // pozadina (samo vidljivi deo)
    ctx.drawImage(this.world.bg, cx, cy, vw, vh, 0, 0, vw, vh);

    ctx.save(); ctx.translate(-cx, -cy);
    // dekoracije u jazbini
    for (const d of this.decoration.placed) Art.decoration(ctx, d);
    // kavez + prijatelj
    Art.cage(ctx, this.world.cage.x, this.world.cage.y, this.friend.state !== 'caged');
    if (this.friend.state !== 'home') Art.friend(ctx, this.friend, this.time);
    // hrana / pickup
    for (const pk of this.pickups) {
      if (pk.kind === 'coral') Art.coral(ctx, pk.x, pk.y, pk.animT);
      else if (pk.kind === 'shell') Art.shellFood(ctx, pk.x, pk.y, pk.animT);
      else this._drawResource(ctx, pk);
    }
    // efekti (ispod entiteta osim swinga)
    this._drawEffects(ctx, false);
    // neprijatelji, boss, igrač
    for (const e of this.enemies) Art.enemy(ctx, e);
    if (!this.boss.dead) Art.boss(ctx, this.boss);
    Art.player(ctx, this.player);
    this._drawEffects(ctx, true);
    ctx.restore();

    // zatamnjenje noći
    const dark = this.dayNight.darkness;
    if (dark > 0.01) {
      ctx.fillStyle = CONFIG.colors.night;
      ctx.globalAlpha = dark; ctx.fillRect(0, 0, vw, vh); ctx.globalAlpha = 1;
      // svetlo oko igrača
      const px = this.player.x - cx, py = this.player.y - cy;
      const g = ctx.createRadialGradient(px, py, 30, px, py, 220);
      g.addColorStop(0, `rgba(255,240,200,${dark * 0.5})`); g.addColorStop(1, 'rgba(255,240,200,0)');
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, 220, 0, 6.2832); ctx.fill();
    }

    // strelica zadatka + HUD
    this.ui.drawWorldOverlay(ctx, this, { x: cx, y: cy });
    if (this.state !== 'lose' && this.state !== 'win') this.ui.drawHUD(ctx, this);

    if (['paused', 'inventory', 'win', 'lose'].includes(this.state)) this.ui.screen(ctx, this);
  }

  _drawResource(ctx, pk) {
    const map = { seaweed: '🌿', stone: '🪨', token: '⭐' };
    ctx.save(); ctx.translate(pk.x, pk.y + Math.sin(pk.animT * 4) * 2);
    Art.shadow(ctx, 0, 8, 10, 4);
    ctx.font = '22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(map[pk.kind] || '⭐', 0, 0);
    ctx.restore();
  }
  _drawEffects(ctx, top) {
    for (const fx of this.effects) {
      const k = fx.t / fx.life;
      if (fx.type === 'swing' && top) {
        ctx.save(); ctx.translate(fx.x, fx.y); ctx.rotate(fx.facing);
        ctx.globalAlpha = 1 - k; ctx.strokeStyle = '#fff'; ctx.lineWidth = 5; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.arc(20, 0, CONFIG.player.attackRange * 0.7, -CONFIG.player.attackArc, CONFIG.player.attackArc); ctx.stroke();
        ctx.restore(); ctx.globalAlpha = 1;
      } else if (fx.type === 'pop' && !top) {
        ctx.globalAlpha = 1 - k; ctx.font = '18px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(fx.txt, fx.x, fx.y - k * 24); ctx.globalAlpha = 1;
      } else if (fx.type === 'eat' && top) {
        ctx.globalAlpha = 1 - k; ctx.fillStyle = '#ffd24a';
        for (let i = 0; i < 4; i++) Art.star(ctx, fx.x + Math.cos(i * 1.6 + k * 3) * (10 + k * 16), fx.y - 20 - k * 14, 3);
        ctx.globalAlpha = 1;
      }
    }
  }

  // ============================================================= ZVUK (mini)
  _initAudio() { try { this.ac = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { this.ac = null; } }
  _resumeAudio() { if (this.ac && this.ac.state === 'suspended') this.ac.resume(); }
  sfx(name) {
    if (!this.ac) return;
    const map = { swing: [320, .08, 'square', .06], hit: [180, .1, 'sawtooth', .08], defeat: [110, .25, 'triangle', .1], pickup: [660, .08, 'sine', .07], eat: [520, .12, 'sine', .08], win: [780, .3, 'sine', .1], night: [160, .4, 'sine', .06], day: [600, .3, 'sine', .06] };
    const m = map[name]; if (!m) return;
    try {
      const o = this.ac.createOscillator(), g = this.ac.createGain();
      o.type = m[2]; o.frequency.value = m[0]; g.gain.value = m[3];
      o.connect(g); g.connect(this.ac.destination); const t = this.ac.currentTime;
      g.gain.setValueAtTime(m[3], t); g.gain.exponentialRampToValueAtTime(0.0001, t + m[1]);
      o.start(t); o.stop(t + m[1]);
    } catch (e) { }
  }
}

/* ============================================================= BOOTSTRAP */
(function () {
  const canvas = document.getElementById('game');
  function fit() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const vw = CONFIG.view.w, vh = CONFIG.view.h, ar = vw / vh;
    let cw = window.innerWidth, ch = window.innerHeight;
    if (cw / ch > ar) cw = ch * ar; else ch = cw / ar;
    canvas.style.width = cw + 'px'; canvas.style.height = ch + 'px';
    canvas.width = Math.round(cw * dpr); canvas.height = Math.round(ch * dpr);
  }
  fit(); addEventListener('resize', fit); addEventListener('orientationchange', () => setTimeout(fit, 100));
  // spreči pinch-zoom / dvostruki-tap zoom na tabletu
  addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, { passive: false });

  const game = new GameManager(canvas);
  window.GAME = game;

  // Pun ekran + zaključavanje orijentacije na prvi dodir (tablet)
  function goFullscreen() {
    game._resumeAudio();
    const el = document.documentElement;
    if (!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen().catch(() => { });
    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => { });
    removeEventListener('pointerdown', goFullscreen);
  }
  addEventListener('pointerdown', goFullscreen);

  let last = performance.now();
  function loop(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;          // ograniči veliki skok (npr. tab u pozadini)
    game.update(dt);
    game.render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

</script>
